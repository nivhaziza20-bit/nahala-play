(function(){

    Wrapped.prototype = Orig.prototype;

  }catch(e){}
  function unlock(){
    var anyRunning = false;
    for(var i=0;i<ctxs.length;i++){
      var c = ctxs[i];

  // start on window 'load' + a blind 2.5s timer. But 'load' fires when the PAGE

  // exactly what the screenshots show.
  // Now the warmup waits for Unity to actually finish booting: the loading bar

  // cap keeps it from never starting if that element is ever missing.
  // The loading BAR can be hidden slightly before the payload is truly finished,
  // so gate on the progress value reaching 100% as well. Measured on a throttled
  // 1.5Mbps run: gating on the bar alone let the warmup start at 88%, and the
  // remaining download immediately slowed from ~5%/10s to ~0.8%/10s ג€” a 6x
  // collapse caused by the warmup stealing bandwidth. Requiring a full 100%
  // (plus the settle delay below) keeps the critical path exclusive.
  function gameIsUp(){

    return !lb || getComputedStyle(lb).display === 'none';
  }
  function startWhenReady(waited){
    if (gameIsUp() || waited > 300000) {

    }
    setTimeout(function(){ startWhenReady(waited + 1000); }, 1000);
  }
