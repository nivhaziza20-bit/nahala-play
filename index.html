(function(){
  // iOS ONLY, and only when the visual viewport really differs from the
  // layout viewport (Safari toolbar showing): shrink the canvas to the
  // visible area so touches stay aligned. Never fight Unity elsewhere.
  var ios = /iPhone|iPad|iPod/.test(navigator.userAgent);
  var LOCK = "width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover";
  // Defense in depth: no matter what the Unity template (or a future version)
  // injects, force EXACTLY ONE viewport meta with our zoom-lock. This is what
  // keeps every touch mapped correctly on iPhone (Niv's clicks bug, 17.7).
  function lockViewport(){
    var metas = document.querySelectorAll('meta[name="viewport"]');
    if(!metas.length){
      var m=document.createElement('meta'); m.name='viewport'; m.content=LOCK;
      document.head.appendChild(m); return;
    }
    for(var i=0;i<metas.length;i++){
      if(i===0){ if(metas[i].getAttribute('content')!==LOCK) metas[i].setAttribute('content',LOCK); }
      else metas[i].parentNode.removeChild(metas[i]); // kill duplicates
    }
  }
  lockViewport();
  // Re-assert after the loader's mobile block runs, and keep watching for late
  // injections.
  document.addEventListener('DOMContentLoaded', lockViewport);
  window.addEventListener('load', lockViewport);
  if(window.MutationObserver){
    new MutationObserver(lockViewport).observe(document.head, { childList:true, subtree:false });
  }
  // Pin container to the full DOCUMENT viewport. documentElement.clientWidth/
  // Height is the most stable value on iOS standalone cold-start / rotation
  // (WebKit bug 170595 makes innerHeight/visualViewport stale). Touch stays
  // correct: canvas fills 100%/100% and Unity reads its rect fresh per event.
  // NOTE (Niv, 18.7): on itch.io mobile the page runs inside an iframe whose
  // width itch caps at (screen - safe-area) ~734pt landscape; we CANNOT exceed
  // the iframe from inside, so any residual grey outer bars are itch's page.
  var de = document.documentElement;
  function fit(){
    window.scrollTo(0,0);
    var cont = document.querySelector("#unity-container");
    var w = de.clientWidth  || window.innerWidth;
    var h = de.clientHeight || window.innerHeight;
    if(cont){
      cont.style.position = "fixed";
      cont.style.left = "0"; cont.style.top = "0";
      cont.style.width  = Math.round(w) + "px";
      cont.style.height = Math.round(h) + "px";
    }
    window.dispatchEvent(new Event("resize"));
  }
  fit();
  window.addEventListener("load", fit);
  if(window.visualViewport){
    visualViewport.addEventListener("resize", fit);
    visualViewport.addEventListener("scroll", fit);
  }
  window.addEventListener("orientationchange", function(){ setTimeout(fit, 350); });
})();
